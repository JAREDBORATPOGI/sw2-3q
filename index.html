<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<title>Q3 Seatwork 2</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootstrap -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background-color:#0d1c46;
color:white;
font-family:Arial, Helvetica, sans-serif;
margin:0;
padding:20px;
}

header{
text-align:center;
margin-bottom:20px;
}

.container-box{
background:#111;
border:2px solid white;
padding:25px;
}

.hero{
text-align:center;
margin-bottom:20px;
}

input{
padding:10px;
background:black;
color:white;
border:1px solid white;
width:200px;
}

button{
padding:10px;
background:black;
color:white;
border:1px solid white;
cursor:pointer;
width:100%;
margin-top:10px;
}

button:hover{
background:white;
color:black;
}

.box{
background:#111;
border:2px solid white;
padding:20px;
margin-top:20px;
}

.laptop{
background:black;
border:1px solid white;
padding:15px;
margin-top:15px;
}

.laptop img{
width:100%;
max-width:250px;
margin-top:10px;
}

#output{
margin-top:20px;
font-weight:bold;
}

a{
color:#4fc3f7;
}

</style>

</head>

<body>

<header>
<h1>Product Locator</h1>
<p>Find the best laptop based on your budget</p>
</header>

<div class="container">

<div class="container-box">

<!-- Budget Search -->

<div class="hero">

<p>Enter your budget:</p>

<input type="number" id="budget" placeholder="Enter amount">

<button onclick="findLaptop()">Search</button>

<div id="output"></div>

</div>

<div class="row">

<!-- Brand Section -->

<div class="col-md-6">

<div class="box">

<h4>Brand Websites</h4>

<button onclick="window.open('https://www.acer.com','_blank')">
Acer
</button>

<button onclick="window.open('https://www.asus.com','_blank')">
Asus
</button>

<button onclick="window.open('https://www.lenovo.com','_blank')">
Lenovo
</button>

</div>

</div>

<!-- Store Section -->

<div class="col-md-6">

<div class="box">

<h4>Store Locations</h4>

<button onclick="window.open('https://villman.com','_blank')">
Villman Computers
</button>

<button onclick="window.open('https://pcx.com.ph','_blank')">
PC Express
</button>

<button onclick="window.open('https://siliconvalley.com.ph','_blank')">
Silicon Valley
</button>

</div>

</div>

</div>

</div>

</div>

<script>

/*
Laptop Recommendation Function

This function checks the user's budget
and recommends a laptop with
model, price, image, and link.
*/

function findLaptop(){

// variable to store the user input
var budget = Number(document.getElementById("budget").value);

var result;

// conditions using >= as requested
if(budget >= 1000){

result = `
<div class="laptop">

ASUS TUF Gaming A16<br>
Price: $1099<br>

<img src="https://dlcdnwebimgs.asus.com/gain/2F48F8D6-8C3F-4B66-AE7C-54FEC1F3C0F6" alt="ASUS TUF Laptop">

<br>

<a href="https://www.asus.com/laptops/for-gaming/tuf-gaming/" target="_blank">
View Laptop
</a>

</div>
`;

}

else if(budget >= 500){

result = `
<div class="laptop">

Lenovo LOQ 15 Gaming Laptop<br>
Price: $999<br>

<img src="https://p1-ofp.static.pub/fes/cms/2023/09/19/9n8fbd4b7j3jq2zqkck0u4j3wskc1p907009.png" alt="Lenovo LOQ">

<br>

<a href="https://www.lenovo.com/us/en/p/laptops/loq-laptops/" target="_blank">
View Laptop
</a>

</div>
`;

}

else if(budget >= 250){

result = `
<div class="laptop">

Acer Aspire 5<br>
Price: $499<br>

<img src="https://www.acer.com/ac/en/US/content/model/NX.K9KAA.001" alt="Acer Aspire 5">

<br>

<a href="https://www.acer.com/laptops/aspire/aspire-5" target="_blank">
View Laptop
</a>

</div>
`;

}

else{

result = "Budget too low for recommended laptops.";

}

// display the result
document.getElementById("output").innerHTML = result;

}

</script>

</body>
</html>
